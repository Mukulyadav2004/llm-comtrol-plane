global:
  scrape_interval: 15s

scrape_configs:
  - job_name: broker
    static_configs:
      - targets: ["broker:8000"]
    metrics_path: /metrics

  - job_name: control-plane
    static_configs:
      - targets: ["control-plane:8001"]
    metrics_path: /metrics

  - job_name: gateway
    static_configs:
      - targets: ["gateway:8002"]
    metrics_path: /metrics

  - job_name: mcp-registry
    static_configs:
      - targets: ["mcp-registry:8003"]
    metrics_path: /metrics

  - job_name: mcp-gateway
    static_configs:
      - targets: ["mcp-gateway:8005"]
    metrics_path: /metrics

  - job_name: agent-gateway
    static_configs:
      - targets: ["agent-gateway:8004"]
    metrics_path: /metrics
